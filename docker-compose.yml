services:
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-siteline_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siteline_pass}
      POSTGRES_DB: ${POSTGRES_DB:-siteline}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-siteline_user}"]
      interval: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://siteline_user:siteline_pass@db:5432/siteline}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      SITELINE_API_KEYS: ${SITELINE_API_KEYS:-demo-key-siteline-2026:free}
      SITELINE_SCHEMA: siteline
    ports:
      - "8000:8000"

  web:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pgdata:
